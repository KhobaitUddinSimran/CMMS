version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: cmms_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - cmms_network

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: cmms_api
    environment:
      # Supabase Configuration (using remote Supabase instance)
      SUPABASE_URL: https://dvrvotajdelswvdxkuyt.supabase.co
      SUPABASE_KEY: sb_publishable_o0QSAC136pbITUn2R_dPwQ_TWxYfePY
      
      # Database URL (Supabase PostgreSQL)
      DATABASE_URL: postgresql+asyncpg://postgres:khubaibcmms@db.dvrvotajdelswvdxkuyt.supabase.co:5432/postgres
      
      # JWT Configuration
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production-min-32-chars}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      
      # Application Configuration
      ENVIRONMENT: development
      DEBUG: false
      LOG_LEVEL: INFO
      
      # CORS Configuration
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost"
      
      # Email Configuration
      EMAIL_PROVIDER: resend
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM_NAME: "CMMS"
      EMAIL_FROM_ADDRESS: "noreply@cmms.utm.my"
      
      # Redis Configuration
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cmms_network
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: cmms_web
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_SUPABASE_URL: https://dvrvotajdelswvdxkuyt.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_o0QSAC136pbITUn2R_dPwQ_TWxYfePY
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - cmms_network
    command: npm run dev

  nginx:
    image: nginx:1.25-alpine
    container_name: cmms_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - web
    networks:
      - cmms_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:

networks:
  cmms_network:
    driver: bridge
