server {
    listen 80 default_server;
    server_name _;
    
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /docs {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }
    
    location /health {
        proxy_pass http://api_backend;
        access_log off;
    }
    
    location / {
        proxy_pass http://web_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
