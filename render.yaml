services:
  # ─────────────────────────────────────────────────
  # Backend  (FastAPI / Python 3.12)
  # ─────────────────────────────────────────────────
  - type: web
    name: cmms-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Supabase – fill in from Supabase Dashboard → Project Settings → API
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Database
      - key: DATABASE_URL
        sync: false
      # Auth – auto-generated secure secret
      - key: JWT_SECRET_KEY
        generateValue: true
      # Email (Gmail SMTP)
      # For Gmail: Use an App Password (https://myaccount.google.com/apppasswords)
      # DO NOT use your regular Gmail password
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      # Gmail App Password (https://myaccount.google.com/apppasswords)
      # Fill these in Render Dashboard → cmms-backend → Environment
      - key: SMTP_LOGIN
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_FROM_NAME
        value: CMMS – UTM
      # App
      - key: ENVIRONMENT
        value: production
      # Frontend URL for email links — auto-wired from frontend service
      - key: FRONTEND_URL
        fromService:
          name: cmms-frontend
          type: web
          property: url
      # CORS — auto-wired from frontend service URL
      - key: CORS_ORIGINS
        fromService:
          name: cmms-frontend
          type: web
          property: url

  # ─────────────────────────────────────────────────
  # Frontend  (Next.js / Node 20)
  # ─────────────────────────────────────────────────
  - type: web
    name: cmms-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    nodeVersion: "20"
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      # Automatically wired to the backend service URL
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: cmms-backend
          type: web
          property: url
      # Server-side alias (used by next.config.js rewrites — not exposed to browser)
      - key: BACKEND_URL
        fromService:
          name: cmms-backend
          type: web
          property: url
      # Supabase public keys (safe to expose in browser)
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      # App
      - key: NODE_ENV
        value: production
