services:
  # ─────────────────────────────────────────────────
  # Backend  (FastAPI / Python 3.12)
  # ─────────────────────────────────────────────────
  - type: web
    name: cmms-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: python -u -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Supabase – fill in from Supabase Dashboard → Project Settings → API
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Auth – auto-generated secure secret
      - key: JWT_SECRET_KEY
        generateValue: true
      # Email (Brevo HTTP API)
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_FROM_NAME
        value: CMMS
      # App
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      # Frontend URL for email links — auto-wired from frontend service
      - key: FRONTEND_URL
        fromService:
          name: cmms-frontend
          type: web
          property: url
      # CORS — auto-wired from frontend service URL
      - key: CORS_ORIGINS
        fromService:
          name: cmms-frontend
          type: web
          property: url

  # ─────────────────────────────────────────────────
  # Keep-alive cron — prevents Render free-tier hibernation
  # Pings backend /health every 10 minutes
  # ─────────────────────────────────────────────────
  - type: cron
    name: cmms-keepalive
    runtime: python
    region: singapore
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: pip install requests
    startCommand: python -c "import requests,os,sys; r=requests.get(os.environ['BACKEND_URL']+'/health',timeout=10); sys.exit(0 if r.ok else 1)"
    envVars:
      - key: BACKEND_URL
        fromService:
          name: cmms-backend
          type: web
          property: url

  # ─────────────────────────────────────────────────
  # Frontend  (Next.js / Node 20)
  # ─────────────────────────────────────────────────
  - type: web
    name: cmms-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    nodeVersion: "20"
    buildCommand: npm install --include=dev && npm run build
    startCommand: node node_modules/.bin/next start -p $PORT
    envVars:
      # Automatically wired to the backend service URL
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: cmms-backend
          type: web
          property: url
      # Server-side alias (used by next.config.js rewrites — not exposed to browser)
      - key: BACKEND_URL
        fromService:
          name: cmms-backend
          type: web
          property: url
      # Supabase public keys (safe to expose in browser)
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      # App
      - key: NODE_ENV
        value: production
